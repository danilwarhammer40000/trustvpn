services:

  postgres:

      image: postgres:16

          container_name: trustvpn_postgres

              restart: always

                  environment:

                        POSTGRES_DB: trustvpn

                              POSTGRES_USER: trustvpn

                                    POSTGRES_PASSWORD: change_me

                                        ports:
                                              - "5432:5432"

                                                  volumes:
                                                        - postgres_data:/var/lib/postgresql/data

                                                          redis:

                                                              image: redis:7

                                                                  container_name: trustvpn_redis

                                                                      restart: always

                                                                          ports:
                                                                                - "6379:6379"

                                                                                    volumes:
                                                                                          - redis_data:/data

                                                                                          volumes:

                                                                                            postgres_data:

                                                                                              redis_data: